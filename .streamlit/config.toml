# Streamlit 화면 테마 설정 (한국도로교통공단 KOROAD 색감: 네이비 + 그린)
[theme]
primaryColor = "#1D3F8C"          # KOROAD 네이비(강조색)
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EEF2F9"   # 옅은 블루그레이
textColor = "#1A2B4A"             # 진한 네이비 텍스트
font = "sans serif"

[server]
# 업로드/요청 관련 기본값. 배포 시 그대로 사용 가능
headless = true
